<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>404 - Archivo no publicado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }
    }

    .float {
      animation: float 2s ease-in-out infinite alternate;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-slate-900 to-black min-h-screen flex items-center justify-center text-white px-6">

  <div class="text-center max-w-xl">

    <!-- Icono divertido -->
    <div class="text-7xl mb-6 float">📂🚧</div>

    <!-- Código error -->
    <h1 class="text-6xl font-extrabold tracking-wide text-indigo-400">
      404
    </h1>

    <!-- Mensaje principal -->
    <p class="mt-6 text-xl text-gray-200">
      Disculpanos... el archivo que buscas aún no ha sido publicado 📄✨
    </p>

    <!-- Mensaje secundario divertido -->
    <p class="mt-3 text-gray-400">
      Probablemente está en revisión, viajando por internet o tomando café ☕
    </p>

   

    <!-- Footer simpático -->
    <p class="mt-12 text-sm text-gray-500">
      Si crees que esto es un error, inténtalo nuevamente en unos minutos 😉
    </p>

  </div>

</body>
</html>
